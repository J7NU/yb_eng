<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 210"
     width="400" height="420"
     fill="none"
     stroke="#1E2A5E"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!--
    영보이엔지 로고 기하학적 재작도 v3
    ─────────────────────────────────────
    viewBox: 0 0 200 210
    원 중심: cx=100, cy=115
    바깥 원 r=86, 안쪽 원 r=75  →  링 두께 11

    관 배치 (ref_clean.png 기준 비율):
      좌관: 외벽 x=79,  내벽 x=93   → 폭 14
      우관: 외벽 x=121, 내벽 x=107  → 폭 14 (좌 미러)
      슬릿(두 내벽 사이): x=93~107, 폭 14
      관 전체 묶음 폭: 79~121 = 42 (원 반지름 86의 약 49%)

    상단 캡: 두 관 묶음 위에 각각 사각 입구
      각 캡: 폭 16 (외벽±1 여유), 높이 8
      좌 캡: x=78, y=12, w=16, h=8
      우 캡: x=106, y=12, w=16, h=8

    직선 구간: y=20 → y=140
    크로스바 2개: x=79~121, y=42 / y=58

    Bulb (둥근 발):
      각 관이 하단(y=140)에서 바깥으로 반원을 그리며 위로 말려 올라옴.
      좌 bulb:
        외벽(x=79) → 왼쪽 큰 호 → 종점 약 (72, 118)
        내벽(x=93) → 왼쪽 작은 호 → 종점 약 (80, 124)
        bulb 상단 마감: 두 종점 연결 짧은 선
      우 bulb: 좌 geometry를 cx=100 미러
      중앙 U홈: 두 내벽 하단 사이 반원 (r≈7)
  -->

  <!-- ① 외곽 이중 원 (기존 수치 유지) -->
  <circle cx="100" cy="115" r="86" stroke-width="4.5"/>
  <circle cx="100" cy="115" r="75" stroke-width="3"/>

  <!-- ② 좌관 + 좌 bulb -->

  <!-- 상단 캡 — 좌관 -->
  <rect x="78" y="12" width="16" height="8" rx="1.5" stroke-width="2.8"/>

  <!-- 외벽 직선: x=79, y=20 → y=140 -->
  <line x1="79" y1="20" x2="79" y2="140" stroke-width="2.8"/>
  <!-- 내벽 직선: x=93, y=20 → y=140 -->
  <line x1="93" y1="20" x2="93" y2="140" stroke-width="2.8"/>

  <!--
    좌 bulb 외벽 곡선:
      시작: (79, 140) — 외벽 하단
      바깥쪽(왼쪽)으로 큰 반원 그리며 위로 말림
      제어점: 79,162 / 57,168 / 57,150 / 62,132 → 종점 (68, 120)
  -->
  <path d="
    M 79,140
    C 79,162  56,168  56,150
    C 56,134  65,123  68,120
  " stroke-width="2.8"/>

  <!--
    좌 bulb 내벽 곡선:
      시작: (93, 140) — 내벽 하단
      왼쪽으로 작은 호를 그리며 위로 말림
      종점: (80, 128)
  -->
  <path d="
    M 93,140
    C 93,156  80,163  79,155
    C 78,147  79,137  80,128
  " stroke-width="2.8"/>

  <!-- bulb 상단 마감선: 외벽 종점(68,120) → 내벽 종점(80,128) -->
  <line x1="68" y1="120" x2="80" y2="128" stroke-width="2.8"/>

  <!-- ③ 우관 + 우 bulb (좌 geometry를 x=100 기준 미러) -->
  <g transform="translate(200,0) scale(-1,1)">
    <!-- 상단 캡 -->
    <rect x="78" y="12" width="16" height="8" rx="1.5" stroke-width="2.8"/>
    <!-- 외벽 직선 -->
    <line x1="79" y1="20" x2="79" y2="140" stroke-width="2.8"/>
    <!-- 내벽 직선 -->
    <line x1="93" y1="20" x2="93" y2="140" stroke-width="2.8"/>
    <!-- 외벽 bulb 곡선 -->
    <path d="
      M 79,140
      C 79,162  56,168  56,150
      C 56,134  65,123  68,120
    " stroke-width="2.8"/>
    <!-- 내벽 bulb 곡선 -->
    <path d="
      M 93,140
      C 93,156  80,163  79,155
      C 78,147  79,137  80,128
    " stroke-width="2.8"/>
    <!-- bulb 상단 마감선 -->
    <line x1="68" y1="120" x2="80" y2="128" stroke-width="2.8"/>
  </g>

  <!-- ④ 크로스바 2개 (두 외벽 사이, x=79~121) -->
  <line x1="79" y1="42" x2="121" y2="42" stroke-width="2.8"/>
  <line x1="79" y1="58" x2="121" y2="58" stroke-width="2.8"/>

  <!--
    ⑤ 중앙 하단 U홈 (두 내벽 사이 반원)
      두 내벽 x=93, x=107 하단을 잇는 아래로 볼록한 U자 호
      sweep-flag=1 → 아래로 볼록 (∪ 방향)
  -->
  <path d="
    M 93,140
    A 7,7  0  0,1  107,140
  " stroke-width="2.8"/>

</svg>
